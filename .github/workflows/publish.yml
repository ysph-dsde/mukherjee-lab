on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.1'

      - name: Install R Dependencies
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Install TinyTeX (TeX for PDF)
        shell: Rscript {0}
        run: |
          install.packages("tinytex", repos = "https://cloud.r-project.org")
          tinytex::install_tinytex(force = TRUE)
          tinytex::tlmgr_path(add = TRUE)

      - name: Make TinyTeX available on PATH
        run: |
          echo "$HOME/.TinyTeX/bin/x86_64-linux" >> $GITHUB_PATH
          echo "$HOME/.TinyTeX/bin/x86_64-pc-linux-gnu" >> $GITHUB_PATH
          which lualatex || true
          lualatex --version || true

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
