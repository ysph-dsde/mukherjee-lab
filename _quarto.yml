project:
  type: website
  render:
    - "**/*.qmd"
    - "!code/Standard Operating Procedure (SOP)/SOP.qmd"
  output-dir: docs

website:
  title: "Mukherjee Lab"
  page-navigation: true
  navbar:
    search: true
    right:
      - text: People
        menu:
          - text: Current Members
            href: pages/people.qmd
          - text: Alumnae
            href: pages/alumnae.qmd
      - text: Software
        href: pages/software.qmd
      - text: Publication and Preprints
        href: pages/publications-preprints.qmd
      - text: Education and Outreach
        href: pages/education-outreach.qmd
      - text: Public Health DSDE at Yale
        href: https://ysph.yale.edu/public-health-research-and-practice/research-centers-and-initiatives/public-health-data-science-and-data-equity/
        target: _blank
  page-footer:
    background: light 
    left: "This site was built on a ysph-dsde.github.io page. It was rendered using Quarto (v 1.6.3) and theme [cosmo](https://github.com/thomaspark/bootswatch/)." 
    center:
      - text: People
        href: pages/people.qmd
      - text: Software
        href: pages/software.qmd
      - text: Publications
        href: pages/publications-preprints.qmd
      - text: Education and Outreach
        href: pages/education-outreach.qmd

language: 
  search-text-placeholder: Search  # Placeholder text for Search

format:
  html:
    theme: cosmo
    css: _styles/styles.css
    toc: true



